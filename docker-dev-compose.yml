services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sea_api_dev
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
      - rabbitmq
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASSWORD}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    # ==================== 开发模式核心：自动热重载 ====================
    volumes:
      - .:/app  # 本地代码实时同步到容器
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload  # 热重载

  mysql:
    image: mysql:8.0
    container_name: sea_mysql_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d 

  redis:
    image: redis:7
    container_name: sea_redis_dev
    ports:
      - "6380:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sea_rabbitmq_dev
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASSWORD}
    
  qdrant:
    image: qdrant/qdrant
    container_name: sea_qdrant_dev
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__LOG_LEVEL: info 
    volumes:
      - ./Qdrant_data_dev:/qdrant/storage  # 开发独立数据目录

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sea_worker_dev
    # ==================== 开发模式核心：Celery 自动重启 ====================
    command: celery -A app.tasks.celery_app worker --loglevel=info --autoreload
    volumes:
      - .:/app  # 代码同步
    depends_on:
      - rabbitmq
      - redis
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql

volumes:
  mysql_data_dev:  # 开发独立数据卷